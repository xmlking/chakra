tag_prefix = "v"
from_latest_tag = false
ignore_merge_commits = true
ignore_fixup_commits = true
disable_changelog = false
disable_bump_commit = false
generate_mono_repository_global_tag = true
generate_mono_repository_package_tags = true
branch_whitelist = ["main"]
skip_ci = "[skip ci]"
skip_untracked = false
pre_bump_hooks = ["echo {{version}}", "npm --no-git-tag-version -f version v{{version}}"]
post_bump_hooks = [
  "git push",
  "git push --tags",
  # "gh release create {{version}} -d -t 'Version {{version}}' -n \"$(cog changelog -a v{{version}})\"",
]
pre_package_bump_hooks = ["echo 'upgrading {{package}}' to {{version}}"]
post_package_bump_hooks = []

# An optional list of additional allowed commit type
# `cog commit {commit_type}` commit command will be generated at runtime
[commit_types]
wip = { changelog_title = "Work in Progress", omit_from_changelog = true }
ops = { changelog_title = "Operations" }

[changelog]
path = "CHANGELOG.md"
template = "remote"
remote = "github.com"
repository = "chakra"
owner = "xmlking"
authors = [{ username = "xmlking", signature = "Sumanth Chinthagunta" }]

[bump_profiles]

[monorepo.packages]
console = { path = "apps/console" }
web = { path = "apps/web" }
